# ice PF MSI-X Limit — User-Configurable Variables
#
# Number of combined TX/RX queue pairs to keep on each PF.
# The devlink msix_vec_per_pf_max is derived as this value + 1
# (one additional vector for the admin queue).
# All remaining MSI-X vectors become available for VFs.
# Must be >= 1. Typical values: 2-16.
ICE_PF_COMBINED_CHANNELS=8

# Comma-separated list of PCI addresses to target.
# Leave empty to target ALL ice PFs with SR-IOV capability.
#   Example: ICE_TARGET_PCI_ADDRESSES=0000:51:00.0,0000:51:00.1
ICE_TARGET_PCI_ADDRESSES=
